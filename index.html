<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Área Privada · Mentoria IA Executiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafaf7;
  --ink: #1f1d1a;
  --ink-soft: #5a5247;
  --accent-warm-dark: #8f6a4d;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  text-align: center;
  padding: 40px;
}
.box {
  max-width: 520px;
}
.eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent-warm-dark);
  margin-bottom: 18px;
}
h1 {
  font-family: 'Playfair Display', serif;
  font-weight: 600;
  font-size: 36px;
  color: var(--ink);
  margin-bottom: 22px;
  line-height: 1.2;
}
p {
  color: var(--ink-soft);
  font-size: 15px;
  line-height: 1.65;
}
.meta {
  margin-top: 36px;
  font-size: 12px;
  color: #8f8678;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>
<div class="box">
  <div class="eyebrow">Mentoria IA Executiva</div>
  <h1>Área privada.</h1>
  <p>Esta página é apenas um placeholder. O acesso aos conteúdos é individual e compartilhado diretamente pelo Rafael com cada mentorado via link próprio.</p>
  <p class="meta">Rafael Lima · 2026</p>
</div>
</body>
</html>
